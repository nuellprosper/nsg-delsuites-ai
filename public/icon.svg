<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background with subtle depth -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>
  
  <!-- Centered Brain Logo -->
  <g transform="translate(256, 256) scale(16)">
    <g transform="translate(-12, -12)" filter="url(#softGlow)">
      <!-- Main Brain Structure -->
      <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 5.586 3.004 3.004 0 0 0 5.193 2.019c.149.404.37.77.651 1.085a3 3 0 1 0 5.299-1.328 4 4 0 0 0 2.526-5.77 4 4 0 0 0-.52-5.586 3.004 3.004 0 0 0-5.193-2.019A4.005 4.005 0 0 0 12 5z" 
            fill="rgba(220, 38, 38, 0.05)" 
            stroke="#DC2626" 
            stroke-width="1.2" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
      
      <!-- Internal Details -->
      <path d="M9 13a4.5 4.5 0 0 0 3 4" 
            fill="none" 
            stroke="#DC2626" 
            stroke-width="1.2" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
      <path d="M6.003 5.125A3 3 0 1 0 12 5" 
            fill="none" 
            stroke="#DC2626" 
            stroke-width="1.2" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
      <path d="M12 18.5a3 3 0 1 0 5.299-1.328" 
            fill="none" 
            stroke="#DC2626" 
            stroke-width="1.2" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
            
      <!-- Central "Core" Highlight -->
      <circle cx="12" cy="12" r="1" fill="#DC2626" opacity="0.5" />
    </g>
  </g>
</svg>
