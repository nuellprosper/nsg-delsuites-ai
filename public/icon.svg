<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Deep black background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#111" />
      <stop offset="100%" style="stop-color:#000" />
    </radialGradient>

    <!-- Intense Red Neon Glow -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="6" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0A0F1C" />
  <circle cx="256" cy="256" r="235" fill="#0A0F1C" stroke="#1a1a1a" stroke-width="12" />
  
  <!-- NSG Text Logo -->
  <g transform="translate(256, 256)" filter="url(#neonGlow)">
    <text x="0" y="0" 
          text-anchor="middle" 
          dominant-baseline="middle" 
          fill="#ff0000" 
          font-family="Arial Black, sans-serif" 
          font-size="160" 
          font-weight="900" 
          font-style="italic"
          letter-spacing="-10">
      NSG
    </text>
  </g>
</svg>
